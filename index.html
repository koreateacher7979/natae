<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생별 학원 스케줄 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f4f8;
            width: 1920px;
            height: 1080px;
            overflow: hidden; /* 바탕화면용 고정 해상도, 스크롤 방지 */
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(31, 38, 135, 0.08);
        }
        .current-day {
            background: #f0f9ff !important;
            border: 2px solid #3b82f6 !important;
        }
        .subject-tag {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .subject-math { background-color: #fee2e2; color: #ef4444; }
        .subject-eng { background-color: #dcfce7; color: #10b981; }
        .subject-kor { background-color: #fef9c3; color: #eab308; }
        .subject-sci { background-color: #e0e7ff; color: #6366f1; }
        .subject-etc { background-color: #f3f4f6; color: #6b7280; }
        
        /* 스크롤바 숨기기 (혹시 내용이 넘칠 경우 대비) */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-6">

    <!-- Header: 높이 축소 -->
    <header class="flex justify-between items-end mb-4 px-2">
        <div>
            <h1 class="text-2xl font-bold text-slate-800 leading-tight">학원 스케줄 통합 관리 대시보드</h1>
            <p class="text-slate-500 text-sm font-medium">개발자: 가치있는 미래교육연구소 대표 김병찬</p>
        </div>
        <div class="text-right">
            <div id="current-time" class="text-2xl font-bold text-blue-600 leading-none"></div>
            <div id="current-date" class="text-slate-500 text-sm font-medium mt-1"></div>
        </div>
    </header>

    <!-- Main Content: 레이아웃 최적화 -->
    <main class="grid grid-cols-2 gap-6 flex-grow overflow-hidden">
        
        <!-- Student 1: 김태윤 -->
        <section class="glass-card p-4 flex flex-col overflow-hidden">
            <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2 flex-shrink-0">
                <h2 class="text-xl font-bold text-slate-700 flex items-center">
                    <span class="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center mr-2 text-sm">태윤</span>
                    김태윤 학생 일정
                </h2>
                <span class="text-xs text-blue-500 font-bold bg-blue-50 px-2 py-1 rounded-full">중등/고등과정</span>
            </div>
            
            <div id="taeyoon-schedule" class="grid grid-cols-1 gap-2 overflow-y-auto pr-1 flex-grow">
                <!-- Weekly Schedule Rows -->
            </div>
        </section>

        <!-- Student 2: 김나윤 -->
        <section class="glass-card p-4 flex flex-col overflow-hidden">
            <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2 flex-shrink-0">
                <h2 class="text-xl font-bold text-slate-700 flex items-center">
                    <span class="w-8 h-8 bg-emerald-500 text-white rounded-full flex items-center justify-center mr-2 text-sm">나윤</span>
                    김나윤 학생 일정
                </h2>
                <span class="text-xs text-emerald-500 font-bold bg-emerald-50 px-2 py-1 rounded-full">고등과정</span>
            </div>
            
            <div id="nayoon-schedule" class="grid grid-cols-1 gap-2 overflow-y-auto pr-1 flex-grow">
                <!-- Weekly Schedule Rows -->
            </div>
        </section>

    </main>

    <!-- Footer Summary: 높이 축소 (h-48 -> h-36) -->
    <footer class="mt-6 grid grid-cols-3 gap-6 h-36 flex-shrink-0">
        <div class="glass-card p-4 border-l-4 border-blue-500 flex flex-col justify-center">
            <h3 class="font-bold text-slate-700 mb-1 text-sm">오늘의 일정 (태윤)</h3>
            <div id="today-summary-taeyoon" class="text-slate-600 text-xs leading-relaxed overflow-y-auto"></div>
        </div>
        <div class="glass-card p-4 border-l-4 border-emerald-500 flex flex-col justify-center">
            <h3 class="font-bold text-slate-700 mb-1 text-sm">오늘의 일정 (나윤)</h3>
            <div id="today-summary-nayoon" class="text-slate-600 text-xs leading-relaxed overflow-y-auto"></div>
        </div>
        <div class="glass-card p-4 bg-gradient-to-br from-blue-600 to-blue-700 text-white flex flex-col justify-center items-center text-center">
            <p class="text-blue-100 text-xs mb-1">총 학습 소요 시간 (오늘)</p>
            <div id="total-duration" class="text-3xl font-black">0시간 0분</div>
            <p class="text-[10px] text-blue-200 mt-1 opacity-80">가치있는 미래교육연구소</p>
        </div>
    </footer>

    <script>
        const RAW_DATA = [
            { student: '김태윤', day: '월', subject: '영어', academy: '손샘영어', time: '18:30~20:30' },
            { student: '김태윤', day: '화', subject: '수학', academy: '옥수학', time: '16:30~19:00' },
            { student: '김태윤', day: '목', subject: '영어', academy: '손샘영어', time: '18:30~20:30' },
            { student: '김태윤', day: '금', subject: '수학', academy: '옥수학', time: '16:30~20:30' },
            { student: '김태윤', day: '토', subject: '국어', academy: '봉국어', time: '11:00~14:00' },
            { student: '김태윤', day: '토', subject: '수학', academy: '옥수학(월성점)', time: '14:00~15:00' },
            { student: '김태윤', day: '토', subject: '국어', academy: '봉국어(특강)', time: '15:00~16:00' },
            { student: '김태윤', day: '토', subject: '수학', academy: '옥수학', time: '16:30~19:00' },
            { student: '김나윤', day: '월', subject: '수학', academy: '디자인오브수학', time: '19:30~22:00' },
            { student: '김나윤', day: '화', subject: '자습', academy: '심야자습(학교)', time: '19:00~22:30' },
            { student: '김나윤', day: '수', subject: '자습', academy: '야간자습(학교)', time: '18:00~21:00' },
            { student: '김나윤', day: '목', subject: '영어', academy: '일등영어', time: '19:00~21:00' },
            { student: '김나윤', day: '금', subject: '자습', academy: '심야자습(학교)', time: '19:00~22:30' },
            { student: '김나윤', day: '토', subject: '국어', academy: '인사이트 국어', time: '13:30~16:00' },
            { student: '김나윤', day: '토', subject: '국어', academy: '인사이트 국어', time: '16:10~17:10' },
            { student: '김나윤', day: '일', subject: '영어', academy: '일등영어', time: '19:00~21:00' }
        ];

        const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];

        function updateDateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            document.getElementById('current-time').textContent = timeStr;
            document.getElementById('current-date').textContent = dateStr;
        }

        function getSubjectClass(subject) {
            if (subject.includes('수학')) return 'subject-math';
            if (subject.includes('영어')) return 'subject-eng';
            if (subject.includes('국어')) return 'subject-kor';
            if (subject.includes('과학')) return 'subject-sci';
            return 'subject-etc';
        }

        function calculateDuration(timeStr) {
            try {
                const [start, end] = timeStr.split('~');
                const startT = start.split(':');
                const endT = end.split(':');
                return (parseInt(endT[0])*60 + parseInt(endT[1])) - (parseInt(startT[0])*60 + parseInt(startT[1]));
            } catch (e) { return 0; }
        }

        function renderSchedule() {
            const today = daysOfWeek[new Date().getDay()];
            const taeyoonContainer = document.getElementById('taeyoon-schedule');
            const nayoonContainer = document.getElementById('nayoon-schedule');
            const todaySummaryTaeyoon = document.getElementById('today-summary-taeyoon');
            const todaySummaryNayoon = document.getElementById('today-summary-nayoon');
            
            taeyoonContainer.innerHTML = '';
            nayoonContainer.innerHTML = '';
            
            let totalTodayMinutes = 0;

            [1, 2, 3, 4, 5, 6, 0].forEach(dayIdx => {
                const dayName = daysOfWeek[dayIdx];
                const isToday = dayName === today;

                const baseClass = `flex items-center p-2 rounded-lg border transition-all ${isToday ? 'current-day shadow-sm' : 'bg-white border-slate-50'}`;
                
                // 김태윤
                const tItems = RAW_DATA.filter(d => d.student === '김태윤' && d.day === dayName);
                if (tItems.length > 0 || isToday) {
                    const row = document.createElement('div');
                    row.className = baseClass;
                    row.innerHTML = `
                        <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center font-bold text-base rounded-md ${isToday ? 'bg-blue-500 text-white' : 'bg-slate-100 text-slate-400'}">
                            ${dayName}
                        </div>
                        <div class="ml-3 flex-grow space-y-1">
                            ${tItems.length > 0 ? tItems.map(item => {
                                const dur = calculateDuration(item.time);
                                if (isToday) totalTodayMinutes += dur;
                                return `
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center space-x-2">
                                            <span class="subject-tag ${getSubjectClass(item.subject)}">${item.subject}</span>
                                            <span class="text-xs font-bold text-slate-700">${item.academy}</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-[11px] font-bold text-slate-600">${item.time}</span>
                                            <span class="text-[10px] text-slate-400 ml-1">(${Math.floor(dur/60)}h ${dur%60}m)</span>
                                        </div>
                                    </div>
                                `;
                            }).join('') : '<div class="text-slate-300 text-xs italic">일정 없음</div>'}
                        </div>
                    `;
                    taeyoonContainer.appendChild(row);
                    if (isToday) todaySummaryTaeyoon.innerHTML = tItems.length > 0 ? tItems.map(i => `• ${i.time} [${i.subject}] ${i.academy}`).join('<br>') : '학원 일정이 없습니다.';
                }

                // 김나윤
                const nItems = RAW_DATA.filter(d => d.student === '김나윤' && d.day === dayName);
                if (nItems.length > 0 || isToday) {
                    const row = document.createElement('div');
                    row.className = baseClass;
                    row.innerHTML = `
                        <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center font-bold text-base rounded-md ${isToday ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}">
                            ${dayName}
                        </div>
                        <div class="ml-3 flex-grow space-y-1">
                            ${nItems.length > 0 ? nItems.map(item => {
                                const dur = calculateDuration(item.time);
                                if (isToday) totalTodayMinutes += dur;
                                return `
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center space-x-2">
                                            <span class="subject-tag ${getSubjectClass(item.subject)}">${item.subject}</span>
                                            <span class="text-xs font-bold text-slate-700">${item.academy}</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-[11px] font-bold text-slate-600">${item.time}</span>
                                            <span class="text-[10px] text-slate-400 ml-1">(${Math.floor(dur/60)}h ${dur%60}m)</span>
                                        </div>
                                    </div>
                                `;
                            }).join('') : '<div class="text-slate-300 text-xs italic">일정 없음</div>'}
                        </div>
                    `;
                    nayoonContainer.appendChild(row);
                    if (isToday) todaySummaryNayoon.innerHTML = nItems.length > 0 ? nItems.map(i => `• ${i.time} [${i.subject}] ${i.academy}`).join('<br>') : '학원 일정이 없습니다.';
                }
            });

            document.getElementById('total-duration').textContent = `${Math.floor(totalTodayMinutes/60)}시간 ${totalTodayMinutes%60}분`;
        }

        window.onload = () => {
            updateDateTime();
            renderSchedule();
            setInterval(updateDateTime, 1000);
            setInterval(renderSchedule, 60000); // 1분마다 요일 체크 및 갱신
        };
    </script>
</body>
</html>
